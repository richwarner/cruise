<!doctype html>
<!--
  Kumo's standalone CSS ships dark-mode tokens behind `data-mode="dark"`.
  Opt every Kumo component into dark mode at the document root before React mounts.
-->
<html lang="en" data-mode="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cruise</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/client/main.tsx"></script>
  </body>
</html>
